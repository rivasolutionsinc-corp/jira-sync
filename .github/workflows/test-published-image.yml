name: Test Published Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * MON'  # Weekly test on Mondays at 9 AM UTC

jobs:
  test-published-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: |
          docker pull ghcr.io/rivasolutionsinc-corp/jira-sync-action:latest
          echo "✓ Successfully pulled published image"

      - name: Test Jira connectivity - List issues
        run: |
          docker run --rm \
            -e JIRA_URL="${{ secrets.JIRA_URL || 'https://your-jira-instance.com/jira' }}" \
            -e JIRA_TOKEN="${{ secrets.JIRA_TOKEN }}" \
            -e PROJECT_KEY="CLOUD" \
            -v ${{ github.workspace }}/.github/actions/jira-sync/test_jira_connectivity.py:/test_jira_connectivity.py \
            --entrypoint python \
            ghcr.io/rivasolutionsinc-corp/jira-sync-action:latest \
            /test_jira_connectivity.py

      - name: Verify image execution
        run: |
          echo "✓ Published Docker image successfully executed"
          echo "✓ Jira connectivity test completed"
          echo "Image: ghcr.io/rivasolutionsinc-corp/jira-sync-action:latest"
