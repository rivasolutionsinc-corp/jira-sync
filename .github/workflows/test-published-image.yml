name: Test Published Docker Image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * MON'  # Weekly test on Mondays at 9 AM UTC

jobs:
  test-published-image:
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: |
          docker pull ghcr.io/rivasolutionsinc-corp/jira-sync-action:latest
          echo "✓ Successfully pulled published image"

      - name: Test published Docker image
        run: |
          docker run --rm \
            -e JIRA_URL="${{ secrets.JIRA_URL || 'https://cmext.ahrq.gov/jira' }}" \
            -e JIRA_TOKEN="${{ secrets.JIRA_TOKEN || 'test-token' }}" \
            -e PROJECT_KEY="CLOUD" \
            -e EVENT_NAME="pull_request" \
            -e PR_BRANCH="test-branch" \
            -e PR_URL="https://github.com/rivasolutionsinc-corp/jira-sync/pull/test" \
            ghcr.io/rivasolutionsinc-corp/jira-sync-action:latest

      - name: Verify image execution
        run: |
          echo "✓ Published Docker image successfully executed"
          echo "Image: ghcr.io/rivasolutionsinc-corp/jira-sync-action:latest"
