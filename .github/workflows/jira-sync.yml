name: Jira Data Center Integration (MCP)
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]

jobs:
  sync-to-jira:
    # Use 'self-hosted' if your runner is inside the AHRQ network
    runs-on: self-hosted
    container:
      image: ghcr.io/sooperset/mcp-atlassian:latest
      env:
        # Use the specific Env Vars required by the sooperset image
        JIRA_URL: "https://cmext.ahrq.gov/jira"
        JIRA_PAT: ${{ secrets.AHRQ_JIRA_PAT }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Jira Ticket
        if: github.event_name == 'issues'
        run: |
          # The image entrypoint allows calling tools directly via CLI
          mcp-atlassian jira_create_issue \
            --project "CLOUD" \
            --summary "GH Issue: ${{ github.event.issue.title }}" \
            --description "URL: ${{ github.event.issue.html_url }}"

      - name: Comment on Jira for PR
        if: github.event_name == 'pull_request'
        run: |
          # Extract Jira key from PR branch name
          JIRA_KEY=$(echo "${{ github.head_ref }}" | grep -oE '[A-Z]+-[0-9]+' || true)
          if [ ! -z "$JIRA_KEY" ]; then
            mcp-atlassian jira_add_comment \
              --issueKey "$JIRA_KEY" \
              --body "Pull Request opened: ${{ github.event.pull_request.html_url }}"
          fi