name: Jira Data Center Integration (MCP)
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    env:
      JIRA_URL: "https://cmext.ahrq.gov/jira"
      JIRA_PAT: ${{ secrets.AHRQ_JIRA_PAT }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MCP Atlassian CLI
        run: npm install -g @modelcontextprotocol/server-atlassian

      - name: Create Jira Ticket
        if: github.event_name == 'issues'
        run: |
          npx @modelcontextprotocol/server-atlassian jira_create_issue \
            --project "CLOUD" \
            --summary "GH Issue: ${{ github.event.issue.title }}" \
            --description "URL: ${{ github.event.issue.html_url }}"

      - name: Comment on Jira for PR
        if: github.event_name == 'pull_request'
        run: |
          # Extract Jira key from PR branch name
          JIRA_KEY=$(echo "${{ github.head_ref }}" | grep -oE '[A-Z]+-[0-9]+' || true)
          if [ ! -z "$JIRA_KEY" ]; then
            npx @modelcontextprotocol/server-atlassian jira_add_comment \
              --issueKey "$JIRA_KEY" \
              --body "Pull Request opened: ${{ github.event.pull_request.html_url }}"
          fi