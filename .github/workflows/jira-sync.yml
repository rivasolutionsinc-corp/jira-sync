name: Jira Data Center Integration (MCP)
on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    env:
      JIRA_PAT: ${{ secrets.JIRA_TOKEN }}

    steps:
      - name: Start MCP Atlassian Server
        run: |
          docker run -d --name mcp-atlassian \
            -e JIRA_URL="https://cmext.ahrq.gov/jira" \
            -e JIRA_PERSONAL_TOKEN="$JIRA_PAT" \
            -p 8080:8080 \
            ghcr.io/sooperset/mcp-atlassian:latest \
            --transport streamable-http --port 8080 --path /mcp --stateless

      - name: Wait for MCP Service
        run: |
          echo "Checking container status..."
          docker ps -a | grep mcp-atlassian
          
          echo "Checking container environment..."
          docker exec mcp-atlassian env | grep -i jira || echo "No JIRA env vars found"
          
          echo "Waiting for MCP service to be ready..."
          sleep 3
          for i in {1..30}; do
            echo "Attempt $i/30: Testing http://localhost:8080/mcp"
            RESPONSE=$(curl -s -X POST http://localhost:8080/mcp \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{"jsonrpc":"2.0","method":"tools/list","id":1}' 2>&1 || true)
            echo "Response: $RESPONSE"
            if echo "$RESPONSE" | grep -q '"tools"'; then
              echo "✓ MCP service is ready with tools available"
              exit 0
            fi
            echo "  → Service not ready yet, retrying in 2s..."
            sleep 2
          done
          
          echo "✗ MCP service failed to start after 30 attempts"
          echo "Final container logs:"
          docker logs mcp-atlassian
          exit 1

      - name: Create Jira Ticket
        if: github.event_name == 'issues'
        run: |
          curl -s -X POST http://localhost:8080/mcp \
            -H "Content-Type: application/json" \
            -H "Accept: application/json, text/event-stream" \
            -d '{
              "jsonrpc": "2.0",
              "method": "tools/call",
              "params": {
                "name": "jira_create_issue",
                "arguments": {
                  "project_key": "CLOUD",
                  "summary": "GH Issue: ${{ github.event.issue.title }}",
                  "description": "URL: ${{ github.event.issue.html_url }}",
                  "issue_type": "Task"
                }
              },
              "id": 1
            }'

      - name: Comment on Jira for PR
        if: github.event_name == 'pull_request'
        run: |
          # Extract Jira key from PR branch name
          JIRA_KEY=$(echo "${{ github.head_ref }}" | grep -oE '[A-Z]+-[0-9]+' || true)
          if [ ! -z "$JIRA_KEY" ]; then
            curl -s -X POST http://localhost:8080/mcp \
              -H "Content-Type: application/json" \
              -H "Accept: application/json, text/event-stream" \
              -d '{
                "jsonrpc": "2.0",
                "method": "tools/call",
                "params": {
                  "name": "jira_add_comment",
                  "arguments": {
                    "issue_key": "'$JIRA_KEY'",
                    "body": "Pull Request opened: ${{ github.event.pull_request.html_url }}"
                  }
                },
                "id": 1
              }'
          fi
