name: Jira Sync

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize, closed]
  create: # Triggers when a git tag is pushed (Production Release)
  workflow_dispatch:
    inputs:
      jira-url:
        description: 'JIRA instance URL (optional, uses JIRA_URL secret if not provided)'
        required: false
      project-key:
        description: 'JIRA project key (optional, uses JIRA_PROJECT_KEY secret if not provided)'
        required: false

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    # Prevent 'create' event from firing on new branches, only tags
    if: github.event_name != 'create' || github.event.ref_type == 'tag'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Debug Event Context
        run: |
          echo "=== GitHub Event Context ==="
          echo "Event Name: ${{ github.event_name }}"
          echo "Event Action: ${{ github.event.action }}"
          echo "Target Branch: ${{ github.base_ref }}"
          echo "Source Branch: ${{ github.head_ref }}"
          echo "Is Merged: ${{ github.event.pull_request.merged }}"
          echo "Ref Type: ${{ github.event.ref_type }}"
          echo "Ref: ${{ github.ref }}"

      - name: Run Jira Sync Action
        # In the central repo, we use the local path. 
        # Consumers will use: rivasolutionsinc-corp/jira-sync/.github/actions/jira-sync@main
        uses: ./.github/actions/jira-sync
        with:
          # JIRA Connection Configuration
          # Required secrets for consumers:
          # - JIRA_URL: Your Jira instance URL (e.g., https://your-org.atlassian.net)
          # - JIRA_TOKEN: Jira API token with issue management permissions
          # - JIRA_PROJECT_KEY: Your project key (e.g., PROJ)
          jira-url: ${{ github.event.inputs.jira-url || secrets.JIRA_URL }}
          jira-token: ${{ secrets.JIRA_TOKEN }}
          project-key: ${{ github.event.inputs.project-key || secrets.JIRA_PROJECT_KEY }}
          
          # 1. GitHub Event Context
          event-name: ${{ github.event_name }}
          event-action: ${{ github.event.action || 'created' }}
          issue-title: ${{ github.event.issue.title }}
          issue-url: ${{ github.event.issue.html_url }}
          pr-branch: ${{ github.head_ref }}
          pr-url: ${{ github.event.pull_request.html_url }}
          
          # 2. Deployment Context
          is-merged: ${{ github.event.pull_request.merged || 'false' }}
          target-branch: ${{ github.base_ref || 'main' }}
          
          # 3. Dynamic State Mapping (The Magic Happens Here)
          transition-on-open: 'In Review'
          
          # GitFlow/Jenkins Alignment: 
          # If target is 'stage', transition to 'In QA' (triggers Stage Deploy)
          # If target is 'main', transition to 'Done' (triggers Prod-Blue Deploy)
          transition-on-merge: ${{ github.base_ref == 'stage' && 'In QA' || 'Done' }}
          
          # Release Alignment
          transition-on-tag: 'Deployed'
