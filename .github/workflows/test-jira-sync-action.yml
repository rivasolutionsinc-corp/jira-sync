name: Test Jira Sync Action

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Event type to simulate'
        required: true
        default: 'pull_request'
        type: choice
        options:
          - issues
          - pull_request

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test Jira Sync Action
        uses: ./.github/actions/jira-sync
        with:
          jira-url: 'https://cmext.ahrq.gov/jira'
          jira-username: ${{ secrets.JIRA_USERNAME }}
          jira-api-token: ${{ secrets.JIRA_API_TOKEN }}
          project-key: 'CLOUD'
          event-name: ${{ github.event.inputs.event_type || github.event_name }}
          issue-title: 'Test Issue from Action'
          issue-url: 'https://github.com/${{ github.repository }}/issues/1'
          pr-branch: 'feature/CLOUD-1929-docker-container-action'
          pr-url: 'https://github.com/${{ github.repository }}/pull/1'

      - name: Log Action Output
        run: |
          echo "Action completed successfully"
          echo "Event: ${{ github.event.inputs.event_type || github.event_name }}"
