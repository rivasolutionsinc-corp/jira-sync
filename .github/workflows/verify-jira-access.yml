name: Verify Jira Access (MCP Refactored)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * MON'  # Run every Monday at 9 AM UTC

env:
  ATLASSIAN_API_TOKEN: ${{ secrets.JIRA_TOKEN }}
  ATLASSIAN_DOMAIN: "cmext.ahrq.gov"

jobs:
  verify-jira-access:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests python-dotenv

      # REPLACE: Direct REST API -> MCP jira_search tool
      - name: Verify Jira Authentication via MCP
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import sys
          import json
          import subprocess

          JIRA_TOKEN = os.getenv('JIRA_TOKEN')
          
          if not JIRA_TOKEN:
              print('ERROR: JIRA_TOKEN secret is not set')
              sys.exit(1)
          
          print('Test 1: Verifying Jira authentication via MCP...')
          
          # Test MCP tool: search_jira_issues
          request = {
              "jsonrpc": "2.0",
              "id": 1,
              "method": "search_jira_issues",
              "params": {"query": "project = ADO ORDER BY created DESC"}
          }
          
          try:
              result = subprocess.run(
                  ["docker", "compose", "-f", "/Users/dietrichgottfriedschmidt/apps/jira-sync/docker-compose.yml", "run", "--rm", "-T", "mcp-atlassian"],
                  input=json.dumps(request).encode(),
                  capture_output=True,
                  timeout=10
              )
              
              if result.returncode == 0:
                  response = json.loads(result.stdout.decode())
                  if "result" in response:
                      print("✓ Authentication successful via MCP")
                      print(f"  Total issues in ADO: {response['result'].get('total', 0)}")
                  else:
                      print("✗ MCP authentication failed")
                      sys.exit(1)
              else:
                  print(f"✗ MCP call failed: {result.stderr.decode()}")
                  sys.exit(1)
          except Exception as e:
              print(f"✗ Error: {e}")
              sys.exit(1)
          
          print("\n✓ Jira access verification via MCP completed successfully!")
          EOF

      - name: Verify Project Access (ADO)
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import sys
          import json
          import subprocess

          JIRA_TOKEN = os.getenv('JIRA_TOKEN')
          
          print('Test 2: Verifying ADO project access via MCP...')
          
          # Test MCP tool: search_jira_issues for ADO project
          request = {
              "jsonrpc": "2.0",
              "id": 1,
              "method": "search_jira_issues",
              "params": {"query": "project = ADO LIMIT 1"}
          }
          
          try:
              result = subprocess.run(
                  ["docker", "compose", "-f", "/Users/dietrichgottfriedschmidt/apps/jira-sync/docker-compose.yml", "run", "--rm", "-T", "mcp-atlassian"],
                  input=json.dumps(request).encode(),
                  capture_output=True,
                  timeout=10
              )
              
              if result.returncode == 0:
                  response = json.loads(result.stdout.decode())
                  if "result" in response:
                      print("✓ ADO project access successful")
                      total = response['result'].get('total', 0)
                      print(f"  Total issues in ADO: {total}")
                      if response['result'].get('issues'):
                          latest = response['result']['issues'][0]
                          print(f"  Latest issue: {latest.get('key')} - {latest.get('summary', 'N/A')}")
                  else:
                      print("✗ ADO project access failed")
                      sys.exit(1)
              else:
                  print(f"✗ MCP call failed: {result.stderr.decode()}")
                  sys.exit(1)
          except Exception as e:
              print(f"✗ Error: {e}")
              sys.exit(1)
          
          print("✓ ADO project access verification completed!")
          EOF

      - name: Verify Project Access (AQD)
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import sys
          import json
          import subprocess

          JIRA_TOKEN = os.getenv('JIRA_TOKEN')
          
          print('Test 3: Verifying AQD project access via MCP...')
          
          # Test MCP tool: search_jira_issues for AQD project
          request = {
              "jsonrpc": "2.0",
              "id": 1,
              "method": "search_jira_issues",
              "params": {"query": "project = AQD LIMIT 1"}
          }
          
          try:
              result = subprocess.run(
                  ["docker", "compose", "-f", "/Users/dietrichgottfriedschmidt/apps/jira-sync/docker-compose.yml", "run", "--rm", "-T", "mcp-atlassian"],
                  input=json.dumps(request).encode(),
                  capture_output=True,
                  timeout=10
              )
              
              if result.returncode == 0:
                  response = json.loads(result.stdout.decode())
                  if "result" in response:
                      print("✓ AQD project access successful")
                      total = response['result'].get('total', 0)
                      print(f"  Total issues in AQD: {total}")
                      if response['result'].get('issues'):
                          latest = response['result']['issues'][0]
                          print(f"  Latest issue: {latest.get('key')} - {latest.get('summary', 'N/A')}")
                  else:
                      print("✗ AQD project access failed")
                      sys.exit(1)
              else:
                  print(f"✗ MCP call failed: {result.stderr.decode()}")
                  sys.exit(1)
          except Exception as e:
              print(f"✗ Error: {e}")
              sys.exit(1)
          
          print("✓ AQD project access verification completed!")
          EOF

      - name: Report Status
        if: success()
        run: echo "✓ Jira access verification completed successfully via MCP"

      - name: Report Failure
        if: failure()
        run: |
          echo "✗ Jira access verification failed"
          echo "Please check:"
          echo "  1. JIRA_TOKEN secret is set in GitHub repository settings"
          echo "  2. The token has not expired"
          echo "  3. The Jira instance is accessible"
          echo "  4. Docker Compose is available on the runner"
          exit 1
