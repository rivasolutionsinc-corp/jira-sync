name: Publish Action Image

on:
  push:
    tags:
      - 'v*.*.*'          # triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:       # manual trigger for testing

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/jira-sync-action

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare action directory
        run: cp jira_integration_script.py .github/actions/jira-sync/

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # GITHUB_TOKEN has packages:write

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}        # v1.2.3
            type=semver,pattern={{major}}.{{minor}} # v1.2
            type=semver,pattern={{major}}           # v1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/actions/jira-sync/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
