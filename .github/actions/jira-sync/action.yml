name: 'Jira Sync'
description: 'Sync GitHub Issues and PRs to a self-hosted Jira Data Center instance via Atlassian MCP'
author: 'AHRQ DevOps'

inputs:
  jira-url:
    description: 'Base URL of the Jira instance (e.g. https://cmext.ahrq.gov/jira)'
    required: true
  jira-username:
    description: 'Jira username or email'
    required: true
  jira-api-token:
    description: 'Jira API Token'
    required: true
  project-key:
    description: 'Jira project key (e.g. CLOUD)'
    required: true
  event-name:
    description: 'GitHub event name: issues or pull_request'
    required: true
  issue-title:
    description: 'GitHub Issue title (for issues event)'
    required: false
    default: ''
  issue-url:
    description: 'GitHub Issue HTML URL (for issues event)'
    required: false
    default: ''
  pr-branch:
    description: 'PR head branch name (for pull_request event)'
    required: false
    default: ''
  pr-url:
    description: 'PR HTML URL (for pull_request event)'
    required: false
    default: ''

outputs:
  jira-key:
    description: 'The Jira issue key that was created or updated'

runs:
  using: 'docker'
  image: 'docker://ghcr.io/sooperset/mcp-atlassian:latest'
  env:
    JIRA_URL: ${{ inputs.jira-url }}
    JIRA_USERNAME: ${{ inputs.jira-username }}
    JIRA_API_TOKEN: ${{ inputs.jira-api-token }}
    PROJECT_KEY: ${{ inputs.project-key }}
    EVENT_NAME: ${{ inputs.event-name }}
    ISSUE_TITLE: ${{ inputs.issue-title }}
    ISSUE_URL: ${{ inputs.issue-url }}
    PR_BRANCH: ${{ inputs.pr-branch }}
    PR_URL: ${{ inputs.pr-url }}
