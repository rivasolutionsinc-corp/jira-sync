name: 'Jira Sync'
description: >
  Sync GitHub Issues and PRs to a self-hosted Jira Data Center instance
  using a custom Docker container with REST API integration.
author: 'DevOps Team'

inputs:
  jira-url:
    description: 'Base URL of the self-hosted Jira Data Center instance (e.g. https://your-jira-instance.com/jira)'
    required: true
  jira-token:
    description: >
      Jira API token for authentication. For Jira Cloud, use an API token.
      For Jira Data Center, use a Personal Access Token (PAT).
    required: true
  project-key:
    description: 'Jira project key (e.g. CLOUD)'
    required: true
  event-name:
    description: 'GitHub event name: issues, pull_request, or create'
    required: true
  event-action:
    description: 'GitHub event action (opened, closed, synchronize, created)'
    required: false
    default: 'created'
  issue-title:
    description: 'GitHub Issue title (for issues event)'
    required: false
    default: ''
  issue-url:
    description: 'GitHub Issue HTML URL (for issues event)'
    required: false
    default: ''
  pr-branch:
    description: 'PR head branch name (for pull_request event)'
    required: false
    default: ''
  pr-url:
    description: 'PR HTML URL (for pull_request event)'
    required: false
    default: ''
  issue-type:
    description: 'Jira Issue Type (e.g., Task, Story, Bug)'
    required: false
    default: 'Task'
  pr-action:
    description: 'PR action type (opened, synchronize, closed)'
    required: false
    default: ''
  is-merged:
    description: 'Flag indicating if PR is merged (true/false)'
    required: false
    default: 'false'
  transition-on-open:
    description: 'Jira transition to apply when PR/Issue is opened'
    required: false
    default: 'In Review'
  transition-on-merge:
    description: 'Jira transition to apply when PR is merged'
    required: false
    default: 'Done'
  transition-on-tag:
    description: 'Jira transition to apply when tag is created'
    required: false
    default: 'Deployed'
  link-title:
    description: 'Custom title for GitHub PR link'
    required: false
    default: 'GitHub PR'
  push-branch:
    description: 'Branch name for push events'
    required: false
    default: ''
  target-branch:
    description: 'Target branch for deployment (develop, stage, main)'
    required: false
    default: 'main'
  transition-tag:
    description: 'Jira transition to apply for tag/push events'
    required: false
    default: ''
  deployment-stage:
    description: 'Deployment stage (development, staging, production)'
    required: false
    default: ''
  deployment-branch:
    description: 'Deployment branch name'
    required: false
    default: ''
  tag-name:
    description: 'Tag name for tag creation events'
    required: false
    default: ''
  tag-ref:
    description: 'Tag reference for tag creation events'
    required: false
    default: ''
  deployment-tag:
    description: 'Deployment tag name'
    required: false
    default: ''

outputs:
  jira-key:
    description: 'The Jira issue key that was created or updated'
    value: ${{ steps.jira-sync.outputs.jira-key }}

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.jira-url }}
    - ${{ inputs.jira-token }}
    - ${{ inputs.project-key }}
    - ${{ inputs.event-name }}
    - ${{ inputs.event-action }}
    - ${{ inputs.issue-title }}
    - ${{ inputs.issue-url }}
    - ${{ inputs.pr-branch }}
    - ${{ inputs.pr-url }}
    - ${{ inputs.issue-type }}
    - ${{ inputs.is-merged }}
    - ${{ inputs.transition-on-open }}
    - ${{ inputs.transition-on-merge }}
    - ${{ inputs.transition-on-tag }}
    - ${{ inputs.link-title }}
